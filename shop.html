<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Shop — GOSHWK</title>
  <style>
    :root { --bg:#0b0b0c; --card:#121215; --muted:#a6a6ad; --text:#f4f4f6; --line:#232328; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 60px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:14px; padding: 6px 0 22px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .dot { width:10px; height:10px; border-radius:999px; background:#fff; opacity:.9; }
    nav { display:flex; gap:16px; color:var(--muted); font-size:14px; }
    nav a:hover { color:var(--text); }

    .grid { display:grid; grid-template-columns: 1.1fr .9fr; gap:22px; align-items:start; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .p { padding:18px; }

    /* Gallery */
    .gallery { padding: 14px; }
    .mainMedia {
      aspect-ratio: 1 / 1;
      width: 100%;
      background:#0f0f12;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .mainMedia img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumbRow { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .thumbBtn {
      width: 84px; aspect-ratio: 1 / 1;
      border-radius:14px; border:1px solid var(--line);
      background:#0f0f12; padding:0; overflow:hidden;
      cursor:pointer; opacity:.85;
    }
    .thumbBtn.active { border-color:#3a3a44; opacity:1; }
    .thumbBtn img { width:100%; height:100%; object-fit:cover; display:block; }

    h1 { font-size: 26px; margin: 0 0 8px; letter-spacing:.2px; }
    .sub { color:var(--muted); margin:0 0 14px; font-size:14px; line-height:1.5; }
    label { display:block; font-size:12px; color:var(--muted); margin: 14px 0 8px; }
    select, input, button {
      width:100%; padding: 12px 12px; border-radius: 12px;
      border: 1px solid var(--line); background:#0f0f12; color:var(--text);
      outline:none;
    }
    .two { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width: 520px) { .two { grid-template-columns: 1fr; } }

    .price { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding: 10px 0 0; }
    .price strong { font-size: 22px; }
    .pill { font-size:12px; color:#0b0b0c; background:#f4f4f6; padding:6px 10px; border-radius:999px; }
    .btn { cursor:pointer; background:#f4f4f6; color:#0b0b0c; border:none; font-weight:700; padding: 13px 14px; border-radius: 14px; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .ghost { background:transparent; border:1px solid var(--line); color:var(--text); font-weight:600; }
    .note { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5; }
    .hr { height:1px; background:var(--line); margin:16px 0; }
    .ok { color:#b7ffbf; }
    .err { color:#ffb7b7; }
    .tiny { font-size:11px; opacity:.9; }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div style="font-weight:800; letter-spacing:.4px;">GOSHWK</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">Minimal drops • Heavyweight basics</div>
        </div>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html" style="color:var(--text);">Shop</a>
      </nav>
    </header>

    <div class="grid">
      <div class="card">
        <div class="gallery">
          <div class="mainMedia">
            <img id="mainImage" src="assets/goshwk_t_front.png" alt="GOSHWK OG TEE">
          </div>
          <div class="thumbRow" id="thumbRow"></div>
        </div>

        <div class="p">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <div>
              <h1 id="productName">GOSHWK OG TEE</h1>
              <p class="sub" id="productDesc">Heavyweight box tee. Built for daily wear. Minimal, sharp, durable.</p>
            </div>
            <span class="pill">Print-on-demand</span>
          </div>
          <div class="hr"></div>
          <div class="sub">Fulfilled by Printful. Shipping + taxes depend on your address.</div>
        </div>
      </div>

      <div class="card">
        <div class="p">
          <div class="price">
            <div style="color:var(--muted); font-size:13px;">Price</div>
            <strong id="price">$—</strong>
          </div>

          <label for="size">Size</label>
          <select id="size">
            <option value="">Select size</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>

          <div class="two">
            <div>
              <label for="color">Color</label>
              <select id="color">
                <option value="">Select color</option>
                <option value="Black">Black</option>
                <option value="White">White</option>
              </select>
            </div>
            <div>
              <label for="qty">Quantity</label>
              <input id="qty" type="number" min="1" value="1" />
            </div>
          </div>

          <div class="hr"></div>

          <button class="btn" id="buyBtn" disabled>Pre-order</button>
          <button class="btn ghost" id="refreshBtn" style="margin-top:10px;">Refresh product data</button>

          <div class="note" id="statusNote">Status: loading…</div>
          <div class="note tiny" id="debugNote"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ====== CONFIG: set your real local gallery images ======
    const PRODUCT_IMAGES = [
      "assets/goshwk_t_front.png",
      "assets/goshwk_t_back.png",
      "assets/goshwk_t_side.png"
    ];

    // ====== Helpers ======
    function el(id) { return document.getElementById(id); }
    function setStatus(html) { el("statusNote").innerHTML = html; }
    function setDebug(text) { el("debugNote").textContent = text || ""; }
    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    // ====== State ======
    let product = null;          // expected: { name, description?, variants:[{size,color,retail_price}] }
    let selectedVariant = null;

    // ====== Gallery ======
    function initGallery() {
      const main = el("mainImage");
      const row = el("thumbRow");
      const images = PRODUCT_IMAGES.filter(Boolean);

      if (!images.length) {
        setStatus('<span class="err">Images not set.</span> Add filenames to PRODUCT_IMAGES.');
        return;
      }

      main.src = images[0];
      main.onerror = () => setStatus('<span class="err">Main image failed to load.</span> Check /assets + filename case.');

      row.innerHTML = images.map((src, i) => `
        <button class="thumbBtn ${i===0 ? "active" : ""}" type="button" data-src="${escapeHtml(src)}">
          <img src="${escapeHtml(src)}" alt="Image ${i+1}">
        </button>
      `).join("");

      row.addEventListener("click", (e) => {
        const btn = e.target.closest(".thumbBtn");
        if (!btn) return;
        const src = btn.getAttribute("data-src");
        if (!src) return;
        main.src = src;
        [...row.querySelectorAll(".thumbBtn")].forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    }

    // ====== Variant selection ======
    function updateVariantFromSelections() {
      const size = el("size").value;
      const color = el("color").value;

      // Offline mode: no Printful data yet
      if (!product?.variants?.length) {
        const ok = !!size && !!color;
        el("buyBtn").disabled = !ok;
        setStatus(ok
          ? '<span class="ok">Ready (offline mode).</span> Size + color selected.'
          : 'Pick a size + color.');
        return;
      }

      selectedVariant = product.variants.find(v => v.size === size && v.color === color) || null;

      if (selectedVariant) {
        const raw = selectedVariant.retail_price ?? selectedVariant.price ?? null;
        el("price").textContent = raw == null ? "$—" : (String(raw).startsWith("$") ? String(raw) : `$${raw}`);
        el("buyBtn").disabled = false;
        setStatus(`<span class="ok">Ready.</span> ${escapeHtml(selectedVariant.color)} / ${escapeHtml(selectedVariant.size)}`);
      } else {
        el("buyBtn").disabled = true;
        setStatus('<span class="err">Variant not found.</span> Printful options don’t match your dropdowns.');
      }
    }

    // ====== Printful loader (with timeout; never hangs) ======
    async function loadProduct() {
      setDebug("Fetching /api/printful/product …");
      setStatus("Loading product data from Printful…");

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);

      try {
        const r = await fetch("/api/printful/product", {
          method: "GET",
          cache: "no-store",
          headers: { "Accept": "application/json" },
          signal: controller.signal
        });

        const j = await r.json().catch(() => ({}));

        if (!r.ok) {
          // IMPORTANT: "HTTP ..." is inside a string, so it can never cause a SyntaxError.
          throw new Error(j?.error || `HTTP ${r.status} from /api/printful/product`);
        }

        // Accept either "clean" shape OR Printful raw shape
        // Clean: { name, description?, variants:[...] }
        // Raw:   { code, result:[...] }  (store products list)
        product = normalizeProduct(j);

        el("productName").textContent = product.name || "GOSHWK OG TEE";
        if (product.description) el("productDesc").textContent = product.description;

        // If variants exist, rebuild dropdowns from Printful
        if (product.variants?.length) {
          const sizes = [...new Set(product.variants.map(v => v.size))].filter(Boolean);
          const colors = [...new Set(product.variants.map(v => v.color))].filter(Boolean);

          if (sizes.length) {
            el("size").innerHTML = `<option value="">Select size</option>` +
              sizes.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
            el("size").value = sizes[0];
          }

          if (colors.length) {
            el("color").innerHTML = `<option value="">Select color</option>` +
              colors.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
            el("color").value = colors[0];
          }
        }

        updateVariantFromSelections();
        setStatus('<span class="ok">Live.</span> Product data loaded.');
        setDebug("Loaded OK.");
      } catch (e) {
        const msg = (e && e.name === "AbortError") ? "Timed out (12s)." : (e?.message || String(e));
        setStatus(`<span class="err">Printful load failed.</span> ${escapeHtml(msg)}`);
        setDebug(msg);
        // Keep the page usable
        updateVariantFromSelections();
      } finally {
        clearTimeout(timeout);
      }
    }

    function normalizeProduct(apiJson) {
      // If your API already returns the clean shape, use it.
      if (apiJson && Array.isArray(apiJson.variants)) return apiJson;

      // If your API returns Printful list: { result: [{id,name,thumbnail_url,...}] }
      if (apiJson && Array.isArray(apiJson.result)) {
        const first = apiJson.result[0] || {};
        return { name: first.name || "GOSHWK OG TEE", variants: [] };
      }

      // Fallback
      return { name: "GOSHWK OG TEE", variants: [] };
    }

    // ====== Pre-order button (safe placeholder) ======
    el("buyBtn").addEventListener("click", () => {
      const size = el("size").value;
      const color = el("color").value;
      const qty = Math.max(1, parseInt(el("qty").value || "1", 10));
      alert(`Pre-order: GOSHWK OG TEE\nSize: ${size}\nColor: ${color}\nQty: ${qty}`);
    });

    // Events
    el("size").addEventListener("change", updateVariantFromSelections);
    el("color").addEventListener("change", updateVariantFromSelections);
    el("refreshBtn").addEventListener("click", loadProduct);

    // Start
    initGallery();
    updateVariantFromSelections();
    loadProduct();
  </script>
</body>
</html>
