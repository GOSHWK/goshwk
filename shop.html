<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Shop — GOSHWK</title>
  <style>
    :root { --bg:#0b0b0c; --card:#121215; --muted:#a6a6ad; --text:#f4f4f6; --line:#232328; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--text); }
    a { color:inherit; text-decoration:none; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 18px 60px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:14px; padding: 6px 0 22px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .dot { width:10px; height:10px; border-radius:999px; background:#fff; opacity:.9; }
    nav { display:flex; gap:16px; color:var(--muted); font-size:14px; }
    nav a:hover { color:var(--text); }

    .grid { display:grid; grid-template-columns: 1.1fr .9fr; gap:22px; align-items:start; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    .p { padding:18px; }

    /* Gallery */
    .gallery { padding: 14px; }
    .mainMedia {
      aspect-ratio: 1 / 1;
      width: 100%;
      background:#0f0f12;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .mainMedia img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumbRow { display:flex; gap:10px; margin-top:12px; flex-wrap:wrap; }
    .thumbBtn {
      width: 84px; aspect-ratio: 1 / 1;
      border-radius:14px; border:1px solid var(--line);
      background:#0f0f12; padding:0; overflow:hidden;
      cursor:pointer; opacity:.85;
    }
    .thumbBtn.active { border-color:#3a3a44; opacity:1; }
    .thumbBtn img { width:100%; height:100%; object-fit:cover; display:block; }

    h1 { font-size: 26px; margin: 0 0 8px; letter-spacing:.2px; }
    .sub { color:var(--muted); margin:0 0 14px; font-size:14px; line-height:1.5; }
    label { display:block; font-size:12px; color:var(--muted); margin: 14px 0 8px; }
    select, input, button, textarea {
      width:100%; padding: 12px 12px; border-radius: 12px;
      border: 1px solid var(--line); background:#0f0f12; color:var(--text);
      outline:none;
    }
    .two { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width: 520px) { .two { grid-template-columns: 1fr; } }

    .price { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding: 10px 0 0; }
    .price strong { font-size: 22px; }
    .pill { font-size:12px; color:#0b0b0c; background:#f4f4f6; padding:6px 10px; border-radius:999px; }
    .btn { cursor:pointer; background:#f4f4f6; color:#0b0b0c; border:none; font-weight:700; padding: 13px 14px; border-radius: 14px; }
    .btn:disabled { opacity:.55; cursor:not-allowed; }
    .ghost { background:transparent; border:1px solid var(--line); color:var(--text); font-weight:600; }
    .note { font-size:12px; color:var(--muted); margin-top:10px; line-height:1.5; }
    .hr { height:1px; background:var(--line); margin:16px 0; }
    .ok { color:#b7ffbf; }
    .err { color:#ffb7b7; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div style="font-weight:800; letter-spacing:.4px;">GOSHWK</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">Minimal drops • Heavyweight basics</div>
        </div>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="shop.html" style="color:var(--text);">Shop</a>
      </nav>
    </header>

    <div class="grid">
      <div class="card">
        <div class="gallery">
          <div class="mainMedia">
            <img id="mainImage" src="assets/IMAGE_HERE_1.jpeg" alt="GOSHWK OG TEE">
          </div>
          <div class="thumbRow" id="thumbRow"></div>
        </div>

        <div class="p">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <div>
              <h1 id="productName">GOSHWK OG TEE</h1>
              <p class="sub" id="productDesc">Heavyweight box tee. Built for daily wear. Minimal, sharp, durable.</p>
            </div>
            <span class="pill">Print-on-demand</span>
          </div>
          <div class="hr"></div>
          <div class="sub">Fulfilled by Printful. Shipping + taxes depend on your address.</div>
        </div>
      </div>

      <div class="card">
        <div class="p">
          <div class="price">
            <div style="color:var(--muted); font-size:13px;">Price</div>
            <strong id="price">$—</strong>
          </div>

          <label for="size">Size</label>
          <select id="size">
            <option value="">Select size</option>
            <option>S</option><option>M</option><option>L</option><option>XL</option>
          </select>

          <div class="two">
            <div>
              <label for="color">Color</label>
              <select id="color">
                <option value="">Select color</option>
                <option>Black</option><option>White</option>
              </select>
            </div>
            <div>
              <label for="qty">Quantity</label>
              <input id="qty" type="number" min="1" value="1" />
            </div>
          </div>

          <div class="hr"></div>

          <button class="btn" id="buyBtn" disabled>Pre-order</button>
          <button class="btn ghost" id="refreshBtn" style="margin-top:10px;">Refresh product data</button>

          <div class="note" id="statusNote">Status: loading…</div>
          <div class="note" id="debugNote" style="opacity:.9;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // 1) YOUR 3 IMAGE FILES
    // Put them in /assets and match names EXACTLY (case sensitive)
    // =========================
    const PRODUCT_IMAGES = [
      "assets/IMAGE_1_HERE.jpg",
      "assets/IMAGE_2_HERE.jpg",
      "assets/IMAGE_3_HERE.jpg"
    ];

    // =========================
    // 2) YOUR VERCEL PROXY DOMAIN
    // Example: "https://goshwk-api.vercel.app"
    // =========================
    const VERCEL_PROXY = "goshwk-collective-1ei6tfrx0-goshwks-projects.vercel.app";

    // Auto API base:
    // - if running locally, you can point to localhost
    // - on GitHub Pages, it will use VERCEL_PROXY
    const API_BASE = (location.hostname === "localhost" || location.hostname === "127.0.0.1")
      ? "http://localhost:3000"
      : VERCEL_PROXY;

    let product = null;
    let selectedVariant = null;

    const el = (id) => document.getElementById(id);

    function setStatus(html) { el("statusNote").innerHTML = html; }
    function setDebug(text) { el("debugNote").textContent = text; }

    function initGallery() {
      const main = el("mainImage");
      const row = el("thumbRow");
      const images = PRODUCT_IMAGES.filter(Boolean);

      if (!images.length) {
        main.alt = "No images set";
        setStatus('<span class="err">Images not set.</span> Add your filenames in PRODUCT_IMAGES.');
        return;
      }

      main.src = images[0];
      main.onerror = () => setStatus('<span class="err">Main image failed to load.</span> Check /assets path + filename case.');

      row.innerHTML = images.map((src, i) => `
        <button class="thumbBtn ${i===0 ? "active" : ""}" data-src="${src}">
          <img src="${src}" alt="Image ${i+1}">
        </button>
      `).join("");

      row.addEventListener("click", (e) => {
        const btn = e.target.closest(".thumbBtn");
        if (!btn) return;
        const src = btn.getAttribute("data-src");
        main.src = src;
        [...row.querySelectorAll(".thumbBtn")].forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    }

    function updateVariantFromSelections() {
      const size = el("size").value;
      const color = el("color").value;

      if (!product?.variants?.length) {
        // no API data yet — allow pre-order only when chosen
        const ok = !!size && !!color;
        el("buyBtn").disabled = !ok;
        setStatus(ok
          ? '<span class="ok">Ready (offline mode).</span> Printful not connected yet.'
          : 'Pick a size + color.');
        return;
      }

      selectedVariant = product.variants.find(v => v.size === size && v.color === color) || null;
      if (selectedVariant) {
        el("price").textContent = selectedVariant.retail_price || selectedVariant.price || "$—";
        el("buyBtn").disabled = false;
        setStatus(`<span class="ok">Ready.</span> ${selectedVariant.color} / ${selectedVariant.size}`);
      } else {
        el("buyBtn").disabled = true;
        setStatus('<span class="err">Variant not found.</span> Printful sizes/colors don’t match your dropdowns.');
      }
    }

    async function loadProduct() {
      setDebug(`API_BASE: ${API_BASE}`);
      if (!API_BASE || API_BASE.includes("goshwk-collective-d1x41f2gj-goshwks-projects.vercel.app")) {
        setStatus('<span class="err">API not set.</span> Replace VERCEL_PROXY with your real Vercel URL.');
        return;
      }

      setStatus("Loading product data from Printful…");

      try {
        const r = await fetch(`${API_BASE}/api/printful/product`, { method: "GET" });
        const j = await r.json().catch(() => ({}));

        if (!r.ok) {
          throw new Error(j?.error || `HTTP ${r.status} from /api/printful/product`);
        }

        product = j;

        el("productName").textContent = product.name || "GOSHWK OG TEE";
        if (product.description) el("productDesc").textContent = product.description;

        // Build dropdowns from API data
        const sizes = [...new Set(product.variants.map(v => v.size))].filter(Boolean);
        const colors = [...new Set(product.variants.map(v => v.color))].filter(Boolean);

        el("size").innerHTML = `<option value="">Select size</option>` + sizes.map(s => `<option value="${s}">${s}</option>`).join("");
        el("color").innerHTML = `<option value="">Select color</option>` + colors.map(c => `<option value="${c}">${c}</option>`).join("");

        // auto select first options
        if (sizes[0]) el("size").value = sizes[0];
        if (colors[0]) el("color").value = colors[0];

        updateVariantFromSelections();
      } catch (e) {
        setStatus(`<span class="err">Printful load failed.</span> ${e.message}`);
      }
    }

    // Events
    el("size").addEventListener("change", updateVariantFromSelections);
    el("color").addEventListener("change", updateVariantFromSelections);
    el("refreshBtn").addEventListener("click", loadProduct);

    // Start
    initGallery();
    updateVariantFromSelections();
    loadProduct();
  </script>
</body>
</html>
