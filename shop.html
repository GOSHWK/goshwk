<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Shop — GOSHWK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="dot"></div>
        <div>
          <div style="font-weight:800; letter-spacing:.4px;">GOSHWK</div>
          <div style="font-size:12px; color:var(--muted); margin-top:2px;">Minimal drops • Heavyweight basics</div>
        </div>
      </div>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a class="active" href="shop.html">Shop</a>
      </nav>
    </header>

    <div class="grid">
      <div class="card">
        <div class="gallery">
          <div class="mainMedia">
            <img id="mainImage" src="assets/goshwk_t_front.png" alt="GOSHWK OG TEE">
          </div>
          <div class="thumbRow" id="thumbRow"></div>
        </div>

        <div class="p">
          <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
            <div>
              <h1 id="productName">GOSHWK OG TEE</h1>
              <p class="sub" id="productDesc">Heavyweight box tee. Built for daily wear. Minimal, sharp, durable.</p>
            </div>
            <span class="pill">Print-on-demand</span>
          </div>
          <div class="hr"></div>
          <div class="sub">Fulfilled by Printful. Shipping + taxes depend on your address.</div>
        </div>
      </div>

      <div class="card">
        <div class="p">
          <div class="priceRow">
            <div style="color:var(--muted); font-size:13px;">Price</div>
            <strong id="price">$—</strong>
          </div>

          <label for="size">Size</label>
          <select id="size">
            <option value="">Select size</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
          </select>

          <div class="two">
            <div>
              <label for="color">Color</label>
              <select id="color">
                <option value="">Select color</option>
                <option value="Black">Black</option>
                <option value="White">White</option>
              </select>
            </div>
            <div>
              <label for="qty">Quantity</label>
              <input id="qty" type="number" min="1" value="1" />
            </div>
          </div>

          <div class="hr"></div>

          <button class="btn" id="buyBtn" disabled>Pre-order</button>
          <button class="btn ghost" id="refreshBtn" style="margin-top:10px;">Refresh product data</button>

          <div class="note" id="statusNote">Status: loading…</div>
          <div class="note tiny" id="debugNote"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { el, escapeHtml, setHtml, setText, fetchJson } from "./site.js";

    // ====== SET YOUR IMAGE FILENAMES HERE (must exist in /assets) ======
    const PRODUCT_IMAGES = [
      "assets/goshwk_t_front.png",
      "assets/goshwk_t_back.png",
      "assets/goshwk_t_side.png"
    ];

    let product = null;
    let selectedVariant = null;

    function setStatus(html){ setHtml("statusNote", html); }
    function setDebug(text){ setText("debugNote", text || ""); }

    function initGallery() {
      const main = el("mainImage");
      const row = el("thumbRow");
      const images = PRODUCT_IMAGES.filter(Boolean);

      if (!images.length) {
        setStatus('<span class="err">Images not set.</span> Add your filenames in PRODUCT_IMAGES.');
        return;
      }

      main.src = images[0];
      main.onerror = () => setStatus('<span class="err">Main image failed to load.</span> Check /assets path + filename case.');

      row.innerHTML = images.map((src, i) => `
        <button class="thumbBtn ${i===0 ? "active" : ""}" type="button" data-src="${escapeHtml(src)}">
          <img src="${escapeHtml(src)}" alt="Image ${i+1}">
        </button>
      `).join("");

      row.addEventListener("click", (e) => {
        const btn = e.target.closest(".thumbBtn");
        if (!btn) return;
        const src = btn.getAttribute("data-src");
        if (!src) return;
        main.src = src;
        [...row.querySelectorAll(".thumbBtn")].forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    }

    function normalizeProduct(apiJson) {
      // Preferred: clean shape from our API
      if (apiJson && Array.isArray(apiJson.variants)) return apiJson;

      // Fallback: if API returns Printful list shape
      if (apiJson && Array.isArray(apiJson.result)) {
        const first = apiJson.result[0] || {};
        return { name: first.name || "GOSHWK OG TEE", description: "", variants: [] };
      }

      return { name: "GOSHWK OG TEE", description: "", variants: [] };
    }

    function updateVariantFromSelections() {
      const size = el("size").value;
      const color = el("color").value;

      if (!product?.variants?.length) {
        const ok = !!size && !!color;
        el("buyBtn").disabled = !ok;
        setStatus(ok
          ? '<span class="ok">Ready (offline mode).</span> Size + color selected.'
          : 'Pick a size + color.');
        return;
      }

      selectedVariant = product.variants.find(v => v.size === size && v.color === color) || null;

      if (selectedVariant) {
        const raw = selectedVariant.retail_price ?? selectedVariant.price ?? null;
        el("price").textContent = raw == null ? "$—" : (String(raw).startsWith("$") ? String(raw) : `$${raw}`);
        el("buyBtn").disabled = false;
        setStatus(`<span class="ok">Ready.</span> ${escapeHtml(selectedVariant.color)} / ${escapeHtml(selectedVariant.size)}`);
      } else {
        el("buyBtn").disabled = true;
        setStatus('<span class="err">Variant not found.</span> Printful sizes/colors don’t match your dropdowns.');
      }
    }

    async function loadProduct() {
      setDebug("Fetching /api/printful/product …");
      setStatus("Loading product data from Printful…");

      try {
        const { ok, status, json } = await fetchJson("/api/printful/product", { timeoutMs: 12000 });

        if (!ok) {
          const msg = json?.error ? String(json.error) : `HTTP ${status} from /api/printful/product`;
          throw new Error(msg);
        }

        product = normalizeProduct(json);

        el("productName").textContent = product.name || "GOSHWK OG TEE";
        if (product.description) el("productDesc").textContent = product.description;

        if (Array.isArray(product.variants) && product.variants.length) {
          const sizes = [...new Set(product.variants.map(v => v.size))].filter(Boolean);
          const colors = [...new Set(product.variants.map(v => v.color))].filter(Boolean);

          if (sizes.length) {
            el("size").innerHTML =
              `<option value="">Select size</option>` +
              sizes.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
            el("size").value = sizes[0];
          }

          if (colors.length) {
            el("color").innerHTML =
              `<option value="">Select color</option>` +
              colors.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
            el("color").value = colors[0];
          }
        }

        updateVariantFromSelections();
        setStatus('<span class="ok">Live.</span> Product data loaded.');
        setDebug("Loaded OK.");
      } catch (e) {
        const msg = e?.message || String(e);
        setStatus(`<span class="err">Printful load failed.</span> ${escapeHtml(msg)}`);
        setDebug(msg);
        updateVariantFromSelections(); // keep offline mode usable
      }
    }

    el("size").addEventListener("change", updateVariantFromSelections);
    el("color").addEventListener("change", updateVariantFromSelections);
    el("refreshBtn").addEventListener("click", loadProduct);

    el("buyBtn").addEventListener("click", () => {
      const size = el("size").value;
      const color = el("color").value;
      const qty = Math.max(1, parseInt(el("qty").value || "1", 10));
      alert(`Pre-order: GOSHWK OG TEE\nSize: ${size}\nColor: ${color}\nQty: ${qty}`);
    });

    initGallery();
    updateVariantFromSelections();
    loadProduct();
  </script>
</body>
</html>
